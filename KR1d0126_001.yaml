body:
  text: 禮記音義隱古者屨頭鼻綦繩相連結之將升堂解之也酳飯畢蕩口也東海樂浪人呼容十二斛者為鼓獵車之形今之鉤車是也衣車如鱉而長也漢桓帝之時禁臣下乘之天子曰不豫諸侯曰不茲大夫曰犬馬士曰負薪雖無列於朝有告凶猶反告於宗後其都無親在故國不復來往也嫌見奪故云恐辱親也嗇夫主諸侯所齎幣帛皮圭之禮奉之以白於天子也雉之肥則足疏並曲禮正義羡車道檀弓釋文萬物在人外非巳所有故以多為貴也樂多其外見者謂衣服萬物悉外見物也巳有功德故得使有所物以光輝祀先人為樂也並禮器正義臘久也久酒有毒郊特牲釋文齊人以相絞訐為掉磬腱筋之大者並內則釋文以魚須飾文竹之邊須音班玉藻釋文尊者委四矢於地一一取以投卑者不敢委於地悉執之也君怠惰當張設法而助之或張強其志以廣大之也並少儀正義侇之言移也雜記釋文㪺容四升也喪大記釋文堂廉即堂上近南霤為廉也練後三日一哭於次次在中門外謂堊室也至大祥則不復於外若有弔者則入即位哭大夫士父母之喪既小祥而歸庶子為大夫士者也適子終喪在殯宮也朱緑皆繒也振容在下羽葆功布等其象皆如麾並喪大記正義卑音必利反祭統釋文符謂甘露醴泉之屬長謂麟鳳五靈之屬經解釋文某甫且字且假借此字也曲禮疏引音義隱堥土釜也內則疏引隱義士有三等一等一拜故三下膝也一云旁猶不正或云衆上都共三拜也喪大記疏引隱義
